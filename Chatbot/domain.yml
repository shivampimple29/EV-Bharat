version: "3.1"

intents:
  - greet
  - goodbye
  - ask_help
  - out_of_scope
  - affirm
  - deny
  - find_station_by_city
  - find_station_by_state
  - find_nearby_stations
  - find_station_by_operator
  - find_station_by_charger_type
  - find_top_rated_stations
  - find_fastest_charger
  - find_verified_stations
  - ask_charger_info
  - ask_port_availability
  - ask_amenities
  - ask_rating
  - ask_operator
  - ask_verified
  - ask_status
  - select_station_from_list

entities:
  - city
  - state
  - charger_type
  - operator
  - number

slots:
  city:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: city

  state:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: state

  charger_type:
    type: categorical
    values:
    - CCS
    - CCS2
    - CHAdeMO
    - Type2
    - AC
    - DC
    mappings:
    - type: from_entity
      entity: charger_type

  operator:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: operator

  selected_number:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: number

  current_station_id:
    type: text
    influence_conversation: true
    mappings:
    - type: custom

  current_station_name:
    type: text
    influence_conversation: true
    mappings:
    - type: custom

  station_ids:
    type: text
    influence_conversation: false
    mappings:
    - type: custom

responses:
  utter_greet:
  - text: "Hey! I'm EVA ⚡ Ask me about EV charging stations!"
  - text: "Hi there! Looking for EV stations? Just ask me!"

  utter_goodbye:
  - text: "Bye! Happy charging! ⚡"
  - text: "See you! Drive electric! 🚗⚡"

  utter_help:
  - text: "You can ask me:\n- Find stations in Mumbai\n- Show CCS chargers\n- Show Tata Power stations\n- Top rated stations\n- Show verified stations\n- Fastest chargers"

  utter_out_of_scope:
  - text: "I only know about EV charging stations. Ask me about those! ⚡"
  - text: "Sorry, I'm just an EV assistant. Try: Find stations in Delhi"

actions:
  - action_search_stations
  - action_get_station_by_id
  - action_find_nearby
